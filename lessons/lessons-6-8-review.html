<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lessons 6–8 Review | Learn Coptic</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header class="topbar">
  <div class="wrap nav">
    <a class="brand" href="../index.html">
      <img src="../assets/images/midwest-logo.png" class="site-logo" alt="Midwest Coptic Logo">
      <span>Learn Coptic</span>
    </a>

    <nav class="links">
      <a href="../levels/level101.html">Level 101</a>
    </nav>
  </div>
</header>

<main>

<section class="lesson-hero">
  <div class="wrap">
    <span class="badge">Level 101 • Review</span>
    <h1>Lessons 6–8 Review</h1>
    <p>Click a Coptic letter, then click the matching name.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">

    <div class="card">
      <h2>Interactive Matching</h2>

      <p id="matchStatus" class="note">
        Start by clicking a Coptic letter.
      </p>

      <div class="matching-board" data-required-matches="2">

        <div class="match-column">
          <h3>Coptic Letter</h3>

          <button class="match-btn coptic" data-group="ghamma" data-type="coptic">Ⲅ ⲅ</button>
          <button class="match-btn coptic" data-group="delta" data-type="coptic">Ⲇ ⲇ</button>
          <button class="match-btn coptic" data-group="so" data-type="coptic">ⲋ</button>
          <button class="match-btn coptic" data-group="theeta" data-type="coptic">Ⲑ ⲑ</button>
          <button class="match-btn coptic" data-group="lavla" data-type="coptic">Ⲗ ⲗ</button>
          <button class="match-btn coptic" data-group="eksi" data-type="coptic">Ⲝ ⲝ</button>
          <button class="match-btn coptic" data-group="pi" data-type="coptic">Ⲡ ⲡ</button>
          <button class="match-btn coptic" data-group="epsilon" data-type="coptic">Ⲩ ⲩ</button>
          <button class="match-btn coptic" data-group="phi" data-type="coptic">Ⲫ ⲫ</button>
          <button class="match-btn coptic" data-group="epsi" data-type="coptic">Ⲯ ⲯ</button>
        </div>

        <div class="match-column">
          <h3>Name</h3>

          <button class="match-btn" data-group="ghamma" data-type="name">Ghamma</button>
          <button class="match-btn" data-group="delta" data-type="name">Delta</button>
          <button class="match-btn" data-group="so" data-type="name">So</button>
          <button class="match-btn" data-group="theeta" data-type="name">Theeta</button>
          <button class="match-btn" data-group="lavla" data-type="name">Lavla</button>
          <button class="match-btn" data-group="eksi" data-type="name">Eksi</button>
          <button class="match-btn" data-group="pi" data-type="name">Pi</button>
          <button class="match-btn" data-group="epsilon" data-type="name">Epsilon</button>
          <button class="match-btn" data-group="phi" data-type="name">Phi</button>
          <button class="match-btn" data-group="epsi" data-type="name">Epsi</button>
        </div>

      </div>

      <button class="btn primary" onclick="resetMatching()">
        Reset Activity
      </button>

    </div>

  </div>
</section>

</main>

<footer class="footer">
  <div class="wrap">
    Level 101 • Lessons 6–8 Review
  </div>
</footer>

<script src="../assets/js/app.js"></script>

</body>
</html>
