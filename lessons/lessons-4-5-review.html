<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lessons 4–5 Review | Learn Coptic</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header class="topbar">
  <div class="wrap nav">
    <a class="brand" href="../index.html">
      <img src="../assets/images/midwest-logo.png" class="site-logo" alt="Midwest Coptic Logo">
      <span>Learn Coptic</span>
    </a>

    <nav class="links">
      <a href="../levels/level101.html">Level 101</a>
    </nav>
  </div>
</header>

<main>

<section class="lesson-hero">
  <div class="wrap">
    <span class="badge">Level 101 • Review</span>
    <h1>Lessons 4–5 Review</h1>
    <p>
      Click a Coptic letter, then click the English letter it looks like,
      then click the sound it makes.
    </p>
  </div>
</section>

<section class="section">
  <div class="wrap">

    <div class="card">
      <h2>Interactive Matching</h2>

      <p id="matchStatus" class="note">
        Start by clicking a Coptic letter.
      </p>

      <div class="matching-board" data-required-matches="3">

        <div class="match-column">
          <h3>Coptic Letter</h3>

          <button class="match-btn coptic" data-group="ti" data-type="coptic">Ϯ ϯ</button>
          <button class="match-btn coptic" data-group="ro" data-type="coptic">Ⲣ ⲣ</button>
          <button class="match-btn coptic" data-group="key" data-type="coptic">Ⲭ ⲭ</button>
          <button class="match-btn coptic" data-group="eeta" data-type="coptic">Ⲏ ⲏ</button>
          <button class="match-btn coptic" data-group="oo" data-type="coptic">Ⲱ ⲱ</button>
          <button class="match-btn coptic" data-group="cima" data-type="coptic">Ⲥ ⲥ</button>
        </div>

        <div class="match-column">
          <h3>Looks Like</h3>

          <button class="match-btn" data-group="ti" data-type="looks">T</button>
          <button class="match-btn" data-group="ro" data-type="looks">P</button>
          <button class="match-btn" data-group="key" data-type="looks">X</button>
          <button class="match-btn" data-group="eeta" data-type="looks">H</button>
          <button class="match-btn" data-group="oo" data-type="looks">W</button>
          <button class="match-btn" data-group="cima" data-type="looks">C</button>
        </div>

        <div class="match-column">
          <h3>Sounds Like</h3>

          <button class="match-btn" data-group="ti" data-type="sound">Ti</button>
          <button class="match-btn" data-group="ro" data-type="sound">R</button>
          <button class="match-btn" data-group="key" data-type="sound">K</button>
          <button class="match-btn" data-group="eeta" data-type="sound">E</button>
          <button class="match-btn" data-group="oo" data-type="sound">O</button>
          <button class="match-btn" data-group="cima" data-type="sound">S</button>
        </div>

      </div>

      <button class="btn primary" onclick="resetMatching()">
        Reset Activity
      </button>

    </div>

  </div>
</section>

</main>

<footer class="footer">
  <div class="wrap">
    Level 101 • Lessons 4–5 Review
  </div>
</footer>

<script src="../assets/js/app.js"></script>

</body>
</html>
